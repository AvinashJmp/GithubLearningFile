name: Marketplace Actions Learning

on: [push]

jobs:
  explore-actions-job:
    runs-on: ubuntu-latest

    steps:
      # स्टेप 1: गिटहब मार्केटप्लेस से बने-बनाए 'checkout' एक्शन का उपयोग करना
      - name: Fetch Code from GitHub to Runner
        uses: actions/checkout@v4    # यहाँ 'uses' का जादू है, यह हमारा कोड रनर में डाउनलोड कर देगा

      # स्टेप 2: अब जब कोड आ चुका है, तो हम 'run' कमांड से फाइलें देख सकते हैं
      - name: Verify Downloaded Files
        run: |
          echo "Listing all project files brought by the checkout action:"
          ls -la
